<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MejoraApp — Mockup Final</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B3A5C;
  --navy-deep: #0D2137;
  --navy-mid: #2E5278;
  --red: #C0392B;
  --red-light: #FDECEA;
  --green: #1A7A4A;
  --green-light: #E8F5EE;
  --gold: #E5C34B;
  --gold-dark: #B7900A;
  --orange: #D35400;
  --bg: #F0F2F6;
  --white: #FFFFFF;
  --text: #1A1A2E;
  --muted: #6B7280;
  --border: #E2E8F0;
  --card: #FFFFFF;
  --radius: 14px;
  --phone-w: 340px;
  --phone-h: 680px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0D2137;
  min-height: 100vh;
  color: var(--text);
}

/* DOC HEADER */
.doc-header {
  background: linear-gradient(135deg, #0D2137 0%, #1B3A5C 60%, #0D2137 100%);
  padding: 28px 36px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
}
.doc-brand { display: flex; align-items: center; gap: 14px; }
.doc-logo {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--gold), #F0A500);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 18px; font-weight: 400; color: var(--navy-deep);
  box-shadow: 0 4px 16px rgba(229,195,75,0.4);
}
.doc-title { font-size: 16px; font-weight: 600; color: white; }
.doc-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.doc-badge {
  background: rgba(229,195,75,0.15);
  border: 1px solid rgba(229,195,75,0.35);
  color: var(--gold);
  font-size: 11px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  letter-spacing: 0.3px;
}

/* SCREEN SELECTOR */
.screen-nav {
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 36px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.screen-nav::-webkit-scrollbar { display: none; }
.snav-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.snav-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
.snav-btn.active {
  background: var(--navy-mid);
  border-color: var(--gold);
  color: white;
}
.snav-btn .snum {
  background: var(--gold);
  color: var(--navy-deep);
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 4px;
}
.snav-btn.active .snum { background: var(--gold); }

/* MAIN CONTENT */
.main {
  padding: 36px;
  display: flex;
  gap: 36px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  min-height: calc(100vh - 130px);
}

/* PHONE MOCKUP */
.phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.phone-label {
  color: rgba(255,255,255,0.3);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.phone-outer {
  width: var(--phone-w);
  background: #1A1A1A;
  border-radius: 44px;
  padding: 12px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 32px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  position: relative;
}
.phone-inner {
  background: var(--bg);
  border-radius: 34px;
  height: var(--phone-h);
  overflow: hidden;
  position: relative;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100px; height: 26px;
  background: #1A1A1A;
  border-radius: 0 0 18px 18px;
  z-index: 20;
}
.phone-home {
  height: 4px;
  background: #333;
  width: 80px;
  border-radius: 2px;
  margin: 8px auto 0;
}

/* SCREEN CONTENT */
.screen {
  display: none;
  height: 100%;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}
.screen.visible { display: flex; }

/* SHARED COMPONENTS */
.app-bar {
  background: var(--navy);
  padding: 32px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.app-bar-logo { display: flex; align-items: center; gap: 8px; }
.app-bar-icon {
  width: 28px; height: 28px;
  background: var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 11px; color: var(--navy-deep);
}
.app-bar-name { color: white; font-size: 13px; font-weight: 600; }
.app-bar-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  letter-spacing: 0.3px;
}
.badge-free { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
.badge-member { background: rgba(26,122,74,0.3); color: #5DCEA0; }
.badge-premium { background: rgba(229,195,75,0.2); color: var(--gold); }

.scroll-area {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.15) transparent;
}

.bottom-nav {
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
}
.bn-item {
  flex: 1;
  padding: 8px 4px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  font-size: 9px;
  color: var(--muted);
  transition: color 0.15s;
}
.bn-item.active { color: var(--navy); }
.bn-icon { font-size: 17px; line-height: 1; }

/* CARDS */
.mc-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin: 8px 14px;
}
.mc-card-body { padding: 12px 14px; }

/* FORM ELEMENTS */
.mc-input {
  width: 100%;
  background: #F8FAFC;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text);
  margin-bottom: 8px;
}
.mc-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 3px;
  display: block;
}
.mc-textarea {
  width: 100%;
  background: #F8FAFC;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text);
  height: 72px;
  resize: none;
}
.mc-btn {
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 9px;
  padding: 11px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  width: 100%;
  cursor: pointer;
}
.mc-btn-gold {
  background: linear-gradient(135deg, var(--gold-dark), #E5A200);
  color: var(--navy-deep);
  border: none;
  border-radius: 9px;
  padding: 11px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  width: 100%;
  cursor: pointer;
}
.mc-btn-ghost {
  background: transparent;
  color: var(--navy);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  width: 100%;
  cursor: pointer;
  margin-top: 6px;
}

/* ANNOTATIONS PANEL */
.annotations {
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.screen-title-block { margin-bottom: 6px; }
.screen-title-block h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: white;
  margin-bottom: 4px;
}
.screen-title-block p { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }
.level-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.ltag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 8px; letter-spacing: 0.3px; }
.lt-all { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
.lt-member { background: rgba(26,122,74,0.2); color: #5DCEA0; }
.lt-premium { background: rgba(229,195,75,0.15); color: var(--gold); }
.lt-admin { background: rgba(211,84,0,0.2); color: #F0A060; }
.lt-new { background: rgba(192,57,43,0.2); color: #F08070; }

.ann-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
}
.ann-card-title {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
}
.ann-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.ann-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.ann-label {
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.ann-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ann-text { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }

.status-box {
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid;
}
.status-new { background: rgba(192,57,43,0.12); border-color: var(--red); }
.status-done { background: rgba(26,122,74,0.12); border-color: var(--green); }
.status-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.status-text { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }

/* ========================================
   SCREEN SPECIFIC STYLES
   ======================================== */

/* S1 - SPLASH */
.splash-bg {
  flex: 1;
  background: linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 50%, var(--navy-mid) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.splash-bg::before {
  content: '';
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(229,195,75,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
}
.splash-logo-big {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--gold), #F0A500);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 28px; color: var(--navy-deep);
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(229,195,75,0.4);
}
.splash-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: white;
  margin-bottom: 6px;
}
.splash-tag { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 36px; }
.splash-benefits { width: 100%; margin-bottom: 36px; }
.splash-benefit {
  display: flex; align-items: center; gap: 10px;
  text-align: left;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.splash-benefit:last-child { border-bottom: none; }
.splash-benefit-icon {
  width: 30px; height: 30px;
  background: rgba(255,255,255,0.07);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.splash-benefit-text { font-size: 12px; color: rgba(255,255,255,0.65); }
.splash-btn-wrap { width: 100%; }
.splash-main-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), #E5A200);
  color: var(--navy-deep);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
}
.splash-sec-btn {
  width: 100%;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

/* S2 - REGISTRO */
.reg-header {
  background: var(--navy);
  padding: 36px 16px 20px;
  flex-shrink: 0;
}
.reg-header h2 {
  font-family: 'DM Serif Display', serif;
  color: white;
  font-size: 20px;
  margin-bottom: 4px;
}
.reg-header p { font-size: 11px; color: rgba(255,255,255,0.45); }
.reg-step-bar {
  display: flex;
  gap: 4px;
  margin-top: 14px;
}
.reg-step { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); }
.reg-step.done { background: var(--gold); }
.reg-step.active { background: rgba(229,195,75,0.5); }

/* S3 - DIAGNÓSTICO */
.diag-header {
  background: linear-gradient(135deg, var(--navy), var(--navy-mid));
  padding: 36px 16px 16px;
  flex-shrink: 0;
}
.diag-q-num { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.diag-q { font-family: 'DM Serif Display', serif; font-size: 17px; color: white; line-height: 1.4; margin-bottom: 8px; }
.diag-progress { height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.diag-fill { height: 100%; width: 37%; background: var(--gold); border-radius: 2px; }
.diag-option {
  margin: 6px 14px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
}
.diag-option.selected {
  border-color: var(--navy);
  background: #EEF3F8;
  color: var(--navy);
  font-weight: 500;
}

/* S4 - HOME */
.home-greeting {
  background: var(--navy);
  padding: 36px 16px 14px;
  flex-shrink: 0;
}
.home-hi { font-size: 18px; font-weight: 700; color: white; margin-bottom: 2px; }
.home-sub { font-size: 11px; color: rgba(255,255,255,0.45); }
.home-event-card {
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.08);
}
.home-event-icon { font-size: 20px; }
.home-event-name { font-size: 12px; font-weight: 600; color: white; }
.home-event-date { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.metric-row { display: flex; gap: 8px; padding: 10px 14px 0; }
.metric-card {
  flex: 1;
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.metric-val { font-size: 20px; font-weight: 700; color: var(--navy); }
.metric-label { font-size: 9px; color: var(--muted); margin-top: 1px; }
.home-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 12px 14px 4px;
}
.home-quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 14px 12px;
}
.hq-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
}
.hq-card.locked {
  background: #FFFBF0;
  border-color: rgba(229,195,75,0.3);
}
.hq-icon { font-size: 20px; margin-bottom: 6px; }
.hq-name { font-size: 11px; font-weight: 600; color: var(--navy); }
.hq-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.hq-lock { font-size: 9px; font-weight: 700; color: var(--gold-dark); margin-top: 3px; }

/* S5 - MURO */
.muro-composer {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px;
  margin: 10px 14px 0;
}
.muro-composer-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.anon-avatar {
  width: 28px; height: 28px;
  background: var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.muro-placeholder {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
}
.muro-post {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 14px;
  margin: 8px 14px 0;
}
.muro-post-type {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 6px;
  margin-bottom: 6px;
}
.pt-ask { background: #EEF3F8; color: var(--navy); }
.pt-case { background: var(--green-light); color: var(--green); }
.pt-opp { background: #FEF3E7; color: var(--orange); }
.muro-post-text { font-size: 12px; color: var(--text); line-height: 1.55; margin-bottom: 6px; }
.muro-post-meta { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
.muro-like-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--muted);
  background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 6px;
}
.muro-like-btn.liked { color: var(--red); background: var(--red-light); }
.ai-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; color: var(--muted);
  background: #F8F9FA; border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 4px; margin-top: 4px;
}

/* S6 - CONTENIDO DE VALOR */
.cv-filters {
  display: flex;
  gap: 6px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  background: white;
  flex-shrink: 0;
}
.cv-filter {
  font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px;
  cursor: pointer; white-space: nowrap;
  background: #F0F2F6; color: var(--muted);
}
.cv-filter.active { background: var(--navy); color: white; }
.cv-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin: 8px 14px 0;
  overflow: hidden;
}
.cv-card-top {
  padding: 12px 14px 8px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.cv-cat {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.cv-tip { background: #FEF9E7; color: var(--gold-dark); }
.cv-est { background: var(--green-light); color: var(--green); }
.cv-ref { background: var(--red-light); color: var(--red); }
.cv-date { font-size: 10px; color: var(--muted); }
.cv-title { font-size: 13px; font-weight: 700; color: var(--text); padding: 0 14px 6px; line-height: 1.4; }
.cv-body { font-size: 11px; color: #555; padding: 0 14px 12px; line-height: 1.6; }
.cv-ai-bar {
  background: #F8F9FA;
  border-top: 1px solid var(--border);
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  color: var(--muted);
}

/* S7 - NOVEDADES */
.nov-card {
  background: white;
  border-radius: var(--radius);
