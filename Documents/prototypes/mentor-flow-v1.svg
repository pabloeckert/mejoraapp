<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <style>
      .flow-bg { fill: #f8fafc; }
      .node { fill: white; stroke: #1e3a5f; stroke-width: 2; rx: 12; }
      .node-ai { fill: #eef2ff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .node-db { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .node-action { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .node-title { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #1e293b; }
      .node-desc { font-family: 'Inter', sans-serif; font-size: 11px; fill: #64748b; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-ai { stroke: #7c3aed; stroke-width: 2; fill: none; marker-end: url(#arrowhead-purple); }
      .title-text { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; fill: #1e3a5f; }
      .subtitle-text { font-family: 'Inter', sans-serif; font-size: 14px; fill: #64748b; }
      .phase-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; fill: #1e3a5f; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1200" height="600" class="flow-bg"/>
  <text x="600" y="40" text-anchor="middle" class="title-text">Flujo de Usuario — Modo Mentor</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle-text">Interacción completa: onboarding → conversación → respuesta personalizada</text>

  <!-- Phase 1: Ingreso -->
  <text x="90" y="100" class="phase-label">FASE 1: INGRESO</text>

  <rect x="40" y="115" width="160" height="60" class="node"/>
  <text x="120" y="140" text-anchor="middle" class="node-title">1. Tocar tab</text>
  <text x="120" y="158" text-anchor="middle" class="node-desc">"Mentor" en BottomNav</text>

  <line x1="200" y1="145" x2="260" y2="145" class="arrow"/>

  <rect x="260" y="115" width="180" height="60" class="node"/>
  <text x="350" y="140" text-anchor="middle" class="node-title">2. Welcome Screen</text>
  <text x="350" y="158" text-anchor="middle" class="node-desc">Contexto del usuario + prompts</text>

  <!-- Phase 2: Conversación -->
  <text x="520" y="100" class="phase-label">FASE 2: CONVERSACIÓN</text>

  <line x1="440" y1="145" x2="500" y2="145" class="arrow"/>

  <rect x="500" y="115" width="180" height="60" class="node"/>
  <text x="590" y="140" text-anchor="middle" class="node-title">3. Escribir consulta</text>
  <text x="590" y="158" text-anchor="middle" class="node-desc">Chat libre o quick action</text>

  <line x1="680" y1="145" x2="740" y2="145" class="arrow"/>

  <rect x="740" y="115" width="180" height="60" class="node-action"/>
  <text x="830" y="140" text-anchor="middle" class="node-title">4. Validar límites</text>
  <text x="830" y="158" text-anchor="middle" class="node-desc">Rate limit + auth check</text>

  <!-- Phase 3: Backend -->
  <text x="520" y="220" class="phase-label">FASE 3: BACKEND (EDGE FUNCTION)</text>

  <line x1="830" y1="175" x2="830" y2="240" class="arrow"/>

  <rect x="740" y="240" width="180" height="70" class="node-ai"/>
  <text x="830" y="265" text-anchor="middle" class="node-title">5. mentor-chat EF</text>
  <text x="830" y="283" text-anchor="middle" class="node-desc">Recibe mensaje + historial</text>
  <text x="830" y="298" text-anchor="middle" class="node-desc">Construye contexto</text>

  <line x1="740" y1="275" x2="680" y2="275" class="arrow-ai"/>

  <rect x="500" y="240" width="180" height="70" class="node-db"/>
  <text x="590" y="265" text-anchor="middle" class="node-title">6. Enriquecer contexto</text>
  <text x="590" y="283" text-anchor="middle" class="node-desc">Perfil + diagnóstico</text>
  <text x="590" y="298" text-anchor="middle" class="node-desc">+ historial conversación</text>

  <line x1="500" y1="275" x2="440" y2="275" class="arrow-ai"/>

  <rect x="260" y="240" width="180" height="70" class="node-ai"/>
  <text x="350" y="265" text-anchor="middle" class="node-title">7. Llamar IA</text>
  <text x="350" y="283" text-anchor="middle" class="node-desc">Gemini → Groq → OpenRouter</text>
  <text x="350" y="298" text-anchor="middle" class="node-desc">Fallback chain</text>

  <!-- Phase 4: Respuesta -->
  <text x="90" y="370" class="phase-label">FASE 4: RESPUESTA</text>

  <line x1="260" y1="275" x2="200" y2="395" class="arrow-ai"/>

  <rect x="40" y="380" width="180" height="60" class="node-db"/>
  <text x="130" y="405" text-anchor="middle" class="node-title">8. Guardar mensaje</text>
  <text x="130" y="423" text-anchor="middle" class="node-desc">mentor_messages (user + AI)</text>

  <line x1="220" y1="410" x2="280" y2="410" class="arrow"/>

  <rect x="280" y="380" width="180" height="60" class="node-action"/>
  <text x="370" y="405" text-anchor="middle" class="node-title">9. Streaming UI</text>
  <text x="370" y="423" text-anchor="middle" class="node-desc">Mostrar respuesta gradual</text>

  <line x1="460" y1="410" x2="520" y2="410" class="arrow"/>

  <rect x="520" y="380" width="180" height="60" class="node"/>
  <text x="610" y="405" text-anchor="middle" class="node-title">10. Acciones post</text>
  <text x="610" y="423" text-anchor="middle" class="node-desc">Sugerir contenido · Guardar</text>

  <!-- Phase 5: Features -->
  <text x="790" y="370" class="phase-label">FEATURES ADICIONALES</text>

  <rect x="760" y="380" width="160" height="50" class="node"/>
  <text x="840" y="405" text-anchor="middle" class="node-title">Historial</text>
  <text x="840" y="420" text-anchor="middle" class="node-desc">Conversaciones anteriores</text>

  <rect x="940" y="380" width="160" height="50" class="node"/>
  <text x="1020" y="405" text-anchor="middle" class="node-title">Contexto dinámico</text>
  <text x="1020" y="420" text-anchor="middle" class="node-desc">Perfil + diagnóstico + prefs</text>

  <rect x="760" y="445" width="160" height="50" class="node"/>
  <text x="840" y="470" text-anchor="middle" class="node-title">Quick Actions</text>
  <text x="840" y="488" text-anchor="middle" class="node-desc">4 prompts contextuales</text>

  <rect x="940" y="445" width="160" height="50" class="node"/>
  <text x="1020" y="470" text-anchor="middle" class="node-title">Rate Limiting</text>
  <text x="1020" y="488" text-anchor="middle" class="node-desc">20 msg/min por usuario</text>

  <!-- System Prompt Box -->
  <rect x="40" y="480" width="680" height="100" fill="white" stroke="#7c3aed" stroke-width="2" rx="12" stroke-dasharray="6 3"/>
  <text x="380" y="505" text-anchor="middle" class="node-title" fill="#7c3aed">System Prompt del Mentor</text>
  <text x="380" y="525" text-anchor="middle" class="node-desc">Sos un mentor de negocios de Mejora Continua. Respondés con tono argentino, directo y práctico.</text>
  <text x="380" y="543" text-anchor="middle" class="node-desc">Contexto inyectado: nombre, empresa, cargo, industria, resultado diagnóstico, historial conversación.</text>
  <text x="380" y="561" text-anchor="middle" class="node-desc">Objetivo: ayudar al usuario a crecer con recomendaciones accionables basadas en su perfil real.</text>
</svg>
