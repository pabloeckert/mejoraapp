<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" fill="#1e3a5f" text-anchor="middle" font-weight="800">FLUJO DE USUARIO — Modo Comunidad</text>

  <!-- Step 1: Entry -->
  <rect x="320" y="60" width="160" height="50" rx="25" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="400" y="90" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">👋 Usuario abre la app</text>

  <!-- Arrow -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Tab Selection -->
  <rect x="300" y="140" width="200" height="44" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="167" font-family="system-ui, sans-serif" font-size="12" fill="#1e3a5f" text-anchor="middle" font-weight="600">Toca "🤝 Comunidad" en BottomNav</text>

  <!-- Arrow -->
  <line x1="400" y1="184" x2="400" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Community View -->
  <rect x="180" y="214" width="440" height="180" rx="16" fill="white" stroke="#2d5a8e" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="240" font-family="system-ui, sans-serif" font-size="14" fill="#1e3a5f" text-anchor="middle" font-weight="700">Pantalla Comunidad</text>

  <!-- Sub-sections inside -->
  <rect x="200" y="252" width="120" height="56" rx="8" fill="#dbeafe"/>
  <text x="260" y="276" font-family="system-ui, sans-serif" font-size="10" fill="#2d5a8e" text-anchor="middle" font-weight="600">📊 Stats Bar</text>
  <text x="260" y="294" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Miembros · Activos · %</text>

  <rect x="340" y="252" width="120" height="56" rx="8" fill="#fef3c7"/>
  <text x="400" y="276" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle" font-weight="600">🔥 Desafío Semanal</text>
  <text x="400" y="294" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">CTA participar</text>

  <rect x="480" y="252" width="120" height="56" rx="8" fill="#dcfce7"/>
  <text x="540" y="276" font-family="system-ui, sans-serif" font-size="10" fill="#166534" text-anchor="middle" font-weight="600">⭐ Destacados</text>
  <text x="540" y="294" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Top 3 miembros</text>

  <rect x="200" y="320" width="400" height="56" rx="8" fill="#f1f5f9"/>
  <text x="400" y="344" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600">👥 Directorio de Miembros</text>
  <text x="400" y="362" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Filtros · Búsqueda · Cards con avatar, nombre, empresa, cargo, bio, badges</text>

  <!-- Branching arrows -->
  <line x1="260" y1="394" x2="160" y2="430" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="394" x2="400" y2="430" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="394" x2="640" y2="430" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Branch A: Profile -->
  <rect x="80" y="430" width="160" height="70" rx="12" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="456" font-family="system-ui, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle" font-weight="700">👤 Ver Perfil</text>
  <text x="160" y="474" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Avatar · Bio · Empresa</text>
  <text x="160" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Badges · Posts · Links</text>

  <!-- Branch B: Connect -->
  <rect x="320" y="430" width="160" height="70" rx="12" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="456" font-family="system-ui, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="700">💬 Conectar</text>
  <text x="400" y="474" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Mensaje directo</text>
  <text x="400" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">o solicitud de conexión</text>

  <!-- Branch C: Challenge -->
  <rect x="560" y="430" width="160" height="70" rx="12" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="456" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="700">🔥 Desafío</text>
  <text x="640" y="474" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Participar · Compartir</text>
  <text x="640" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Ver participantes</text>

  <!-- Return arrows -->
  <path d="M 160 500 L 160 540 L 400 540 L 400 560" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <path d="M 400 500 L 400 560" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <path d="M 640 500 L 640 540 L 400 540 L 400 560" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

  <!-- End state -->
  <rect x="320" y="560" width="160" height="32" rx="16" fill="#16a34a"/>
  <text x="400" y="581" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">✅ Engagement Loop</text>
</svg>