name: Deploy Production (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test

      - name: Build production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Verify build
        run: |
          test -f dist/index.html || (echo "❌ Build failed" && exit 1)
          echo "✅ Build OK — $(du -sh dist/)"

      - name: Bundle size check
        run: |
          TOTAL=$(du -sh dist/ | cut -f1)
          echo "📦 Bundle size: $TOTAL"
          # Warn if bundle > 5MB (gzipped should be ~355KB)
          BYTES=$(du -sb dist/ | cut -f1)
          if [ "$BYTES" -gt 5242880 ]; then
            echo "::warning::Bundle size ($TOTAL) exceeds 5MB. Check for unintended large files."
          fi

      - name: Health check (post-deploy)
        if: success()
        run: |
          echo "⏳ Waiting 30s for Vercel deployment to propagate..."
          sleep 30
          bash scripts/verify-deploy.sh https://app.mejoraok.com

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy pipeline failed for commit ${{ github.sha }}. Check logs above."

      - name: Build summary
        if: always()
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: Vercel auto-deploys from main" >> $GITHUB_STEP_SUMMARY
          echo "- Health: ${{ job.status == 'success' && '✅ OK' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
