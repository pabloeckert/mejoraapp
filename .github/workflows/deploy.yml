name: Deploy Production (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run tests
        run: npm run test

      - name: Build production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Verify build
        run: |
          test -f dist/index.html || (echo "❌ Build failed" && exit 1)
          echo "✅ Build OK — $(du -sh dist/)"

      - name: Health check (post-deploy)
        if: success()
        run: |
          echo "⏳ Waiting 30s for Vercel deployment to propagate..."
          sleep 30
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.mejoraok.com || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS) — attempt $i"
              exit 0
            fi
            echo "⚠️ Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy pipeline failed for commit ${{ github.sha }}. Check logs above."

      - name: Build summary
        if: always()
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: Vercel auto-deploys from main" >> $GITHUB_STEP_SUMMARY
          echo "- Health: ${{ job.status == 'success' && '✅ OK' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
