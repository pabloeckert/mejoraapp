name: Build & Deploy to Hostinger (FTP)

# Trigger on push to main, or manually from Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent deploys overwriting each other
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and FTP deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          echo "✅ Build size:"
          du -sh dist/

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /public_html/app/
          # Avoid uploading dev / git files; only sync changed files
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
          log-level: minimal

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: app.mejoraok.com (Hostinger /public_html/app)" >> $GITHUB_STEP_SUMMARY
