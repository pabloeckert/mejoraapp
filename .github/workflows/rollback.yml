name: Rollback — Deploy a previous version

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to rollback to (e.g. d56f4bd)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: false
        default: 'manual rollback'

jobs:
  rollback:
    name: 'Rollback to ${{ inputs.commit_sha }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Verify commit exists
        run: |
          echo "📌 Rolling back to commit: ${{ inputs.commit_sha }}"
          echo "📝 Message: $(git log -1 --pretty=format:'%s' ${{ inputs.commit_sha }})"
          echo "📅 Date: $(git log -1 --pretty=format:'%ci' ${{ inputs.commit_sha }})"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Verify build output
        run: test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /public_html/app/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
          log-level: minimal

      - name: Health check
        if: success()
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.mejoraok.com)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Rollback successful (HTTP $STATUS)"
          else
            echo "⚠️ Health check returned HTTP $STATUS"
            exit 1
          fi

      - name: Rollback summary
        if: always()
        run: |
          echo "## 🔄 Rollback summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rolled back to: ${{ inputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: app.mejoraok.com" >> $GITHUB_STEP_SUMMARY
