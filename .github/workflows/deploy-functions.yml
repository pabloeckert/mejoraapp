name: Deploy Edge Functions (Supabase)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      functions:
        description: 'Functions to deploy (comma-separated, or "all")'
        required: false
        default: 'all'

concurrency:
  group: supabase-functions
  cancel-in-progress: false

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm install -g supabase@latest

      - name: Determine functions to deploy
        id: functions
        run: |
          INPUT="${{ github.event.inputs.functions || 'all' }}"
          if [ "$INPUT" = "all" ]; then
            # Deploy all functions except _shared
            FUNCS=$(ls -d supabase/functions/*/ | xargs -I{} basename {} | grep -v _shared | tr '\n' ' ')
          else
            FUNCS=$(echo "$INPUT" | tr ',' ' ')
          fi
          echo "list=$FUNCS" >> $GITHUB_OUTPUT
          echo "📦 Functions to deploy: $FUNCS"

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

          for func in ${{ steps.functions.outputs.list }}; do
            echo ""
            echo "━━━ Deploying: $func ━━━"
            supabase functions deploy "$func" --project-ref "$SUPABASE_PROJECT_ID" || {
              echo "❌ Failed to deploy $func"
              exit 1
            }
            echo "✅ $func deployed"
          done

          echo ""
          echo "✅ All Edge Functions deployed successfully"

      - name: Verify functions
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🔍 Verifying deployed functions..."
          sleep 5

          # Test verify-admin endpoint (should return 401 without auth = function is alive)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/functions/v1/verify-admin" \
            -H "Content-Type: application/json" 2>/dev/null || echo "000")

          if [ "$STATUS" = "401" ] || [ "$STATUS" = "400" ]; then
            echo "✅ verify-admin responding (HTTP $STATUS)"
          else
            echo "⚠️  verify-admin returned HTTP $STATUS (may be OK)"
          fi

      - name: Deploy summary
        if: always()
        run: |
          echo "## Edge Functions Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Functions: ${{ steps.functions.outputs.list }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
