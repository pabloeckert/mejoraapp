name: Deploy GitHub Pages (Preview)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ghpages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy to GH Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_GITHUB_PAGES: 'true'

      - name: Verify build
        run: |
          test -f dist/index.html || (echo "❌ Build failed" && exit 1)
          echo "✅ Build OK — $(du -sh dist/)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Build summary
        if: always()
        run: |
          echo "## GitHub Pages Deploy (Preview)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://pabloeckert.github.io/MejoraApp/" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ Preview only — Producción sigue en Vercel (app.mejoraok.com)" >> $GITHUB_STEP_SUMMARY
