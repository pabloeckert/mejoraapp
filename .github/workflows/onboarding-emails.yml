name: Onboarding Emails (cron)

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  send-emails:
    name: Send onboarding emails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger send-onboarding-email
        run: |
          curl -s -X POST \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/send-onboarding-email" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ Sent: {d.get(\"sent\",0)} | Failed: {d.get(\"failed\",0)} | Total: {d.get(\"total\",0)}')"
