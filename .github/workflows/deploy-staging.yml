name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for staging deploy'
        required: false
        default: 'manual staging deploy'

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run tests
        run: npm run test

      - name: Build staging bundle
        run: npm run build:staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_STAGING_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_STAGING_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ENVIRONMENT: staging

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          echo "✅ Staging build size:"
          du -sh dist/

      - name: Deploy staging to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /public_html/app-staging/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
          log-level: minimal

      - name: Deploy summary
        if: always()
        run: |
          echo "## Staging Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: staging.app.mejoraok.com" >> $GITHUB_STEP_SUMMARY
